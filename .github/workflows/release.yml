name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build plugin zip (production files only)
        run: |
          mkdir -p build/withdrawal-button
          rsync -a \
            --exclude vendor \
            --exclude tests \
            --exclude bin \
            --exclude .git \
            --exclude .github \
            --exclude .gitignore \
            --exclude .phpunit.result.cache \
            --exclude composer.json \
            --exclude composer.lock \
            --exclude phpunit.xml.dist \
            --exclude build \
            ./ build/withdrawal-button/
          cd build && zip -r withdrawal-button.zip withdrawal-button

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/withdrawal-button.zip
            docs/screenshots/*.png
          fail_on_unmatched_files: false
          generate_release_notes: true
