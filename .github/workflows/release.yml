name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          mkdir -p build/withdrawal-button
          rsync -a \
            --exclude vendor \
            --exclude tests \
            --exclude .git \
            --exclude .github \
            --exclude .phpunit.result.cache \
            --exclude build \
            ./ build/withdrawal-button/
          cd build && zip -r withdrawal-button.zip withdrawal-button

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/withdrawal-button.zip
          generate_release_notes: true
